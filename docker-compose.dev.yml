version: '3.8'

services:
  # PostgreSQL Database
  database:
    image: postgres:16
    container_name: postgres_database
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Admin@123
      POSTGRES_DB: escola_conectada_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - escola-conectada-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d escola_conectada_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Backend .NET API
  backend:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile.dev # AJUSTE: Usa o seu Dockerfile de desenvolvimento
    container_name: escola-conectada-backend
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development # AJUSTE: Habilita Swagger e logs detalhados
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=database;Port=5432;Database=escola_conectada_db;Username=admin;Password=Admin@123"
    ports:
      - "5231:8080"
    volumes:
      - ./BackEnd/logs:/app/logs
      # DICA: Se quiser "Hot Reload", você pode mapear o volume do código aqui
    depends_on:
      database:
        condition: service_healthy
    networks:
      - escola-conectada-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Angular
  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile # Mude para Dockerfile.dev se tiver um específico para o Angular
    container_name: escola-conectada-frontend
    restart: unless-stopped
    ports:
      - "4200:8080"
    depends_on:
      backend:
        condition: service_started
    networks:
      - escola-conectada-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

# Networks
networks:
  escola-conectada-network:
    driver: bridge
    name: escola-conectada-network