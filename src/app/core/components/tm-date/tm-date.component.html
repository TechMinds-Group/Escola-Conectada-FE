<div class="tm-date-container w-100" [class.disabled]="disabled">
  @if (label) {
    <label class="form-label small fw-bold text-muted text-uppercase tracking-wider mb-2">
      {{ label }}
    </label>
  }

  <!-- Trigger Input -->
  <div
    class="input-wrapper d-flex align-items-center rounded-3 shadow-sm transition-all cursor-pointer"
    [class.focused]="isOpen()"
    (click)="togglePicker($event)"
    cdkOverlayOrigin
    #overlayOrigin="cdkOverlayOrigin"
  >
    <div class="icon-section pe-2 ps-3 py-2 d-flex align-items-center justify-content-center">
      <i class="bi bi-calendar3 text-primary fs-5 transition-hover"></i>
    </div>

    <input
      #dateInput
      type="text"
      readonly
      [disabled]="disabled"
      [placeholder]="placeholder"
      [value]="displayValue()"
      class="custom-input flex-grow-1 fw-bold border-0 bg-transparent cursor-pointer ps-2"
    />
  </div>
</div>

<!-- Calendar Overlay -->
<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="overlayOrigin"
  [cdkConnectedOverlayOpen]="isOpen()"
  [cdkConnectedOverlayHasBackdrop]="true"
  cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
  [cdkConnectedOverlayPositions]="positions"
  (backdropClick)="closePicker()"
>
  <div class="tm-date-panel shadow-lg rounded-4 overflow-hidden border">
    <!-- Header (Mês e Ano) -->
    <div
      class="panel-header bg-primary text-white p-3 d-flex justify-content-between align-items-center"
    >
      <button class="btn btn-sm btn-link text-white p-1" (click)="prevMonth($event)">
        <i class="bi bi-chevron-left fs-5"></i>
      </button>
      <div class="fw-bold fs-6 text-capitalize text-center">
        {{ currentViewDate() | date: 'MMMM yyyy' : '' : 'pt-BR' }}
      </div>
      <button class="btn btn-sm btn-link text-white p-1" (click)="nextMonth($event)">
        <i class="bi bi-chevron-right fs-5"></i>
      </button>
    </div>

    <div class="panel-body p-3 plugin-bg-surface">
      <!-- Days of Week -->
      <div class="days-grid fw-bold text-muted small text-center mb-2">
        @for (wd of weekDays; track wd) {
          <div>{{ wd }}</div>
        }
      </div>

      <!-- Calendar Days Matrix -->
      <div class="calendar-grid text-center">
        @for (day of calendarDays(); track day.date.toISOString()) {
          <div
            class="calendar-cell p-1 rounded-3 transition-hover cursor-pointer fw-semibold"
            [class.text-muted]="!day.isCurrentMonth"
            [class.bg-primary]="day.isSelected"
            [class.text-white]="day.isSelected"
            [class.border-primary]="day.isToday && !day.isSelected"
            [class.today-border]="day.isToday && !day.isSelected"
            (click)="selectDay(day)"
          >
            {{ day.date.getDate() }}
          </div>
        }
      </div>

      <hr class="opacity-25 my-3" />

      <!-- Time Selectors -->
      <div class="time-section d-flex justify-content-center align-items-center gap-2 mb-2">
        <i class="bi bi-clock text-muted"></i>

        <select
          class="form-select form-select-sm fw-bold border-0 shadow-xs time-select text-center"
          style="width: 70px; border-radius: 8px"
          [value]="selectedHour()"
          (change)="selectHour($any($event.target).value)"
        >
          @for (h of hours; track h) {
            <option [value]="h">{{ h }}</option>
          }
        </select>
        <span class="fw-bold colon-separator">:</span>
        <select
          class="form-select form-select-sm fw-bold border-0 shadow-xs time-select text-center"
          style="width: 70px; border-radius: 8px"
          [value]="selectedMinute()"
          (change)="selectMinute($any($event.target).value)"
        >
          @for (m of minutes; track m) {
            <option [value]="m">{{ m }}</option>
          }
        </select>
      </div>
    </div>

    <!-- Footer Actions -->
    <div class="panel-footer plugin-bg-surface p-2 d-flex justify-content-between border-top">
      <button class="btn btn-sm btn-outline-secondary fw-bold rounded-3 px-3" (click)="clear()">
        Limpar
      </button>
      <button class="btn btn-sm btn-primary fw-bold rounded-3 px-3" (click)="setToday()">
        Hoje
      </button>
    </div>
  </div>
</ng-template>
