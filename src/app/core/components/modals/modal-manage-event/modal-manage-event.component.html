<div [class.d-none]="!isOpen" [class.d-block]="isOpen">
  <div
    class="modal fade"
    [class.show]="isOpen"
    [class.d-block]="isOpen"
    tabindex="-1"
    [style.background]="isOpen ? 'rgba(0,0,0,0.5)' : 'none'"
  >
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
        <!-- Header -->
        <div class="modal-header bg-primary text-white border-0 py-3 px-4">
          <h5 class="modal-title fw-bold">
            <i class="bi bi-calendar-event me-2"></i>
            {{ editingEventId() ? 'Editar Evento' : 'Novo Evento' }}
          </h5>
          <button
            type="button"
            class="btn-close btn-close-white"
            (click)="closeModal()"
            aria-label="Close"
          ></button>
        </div>

        <!-- Body -->
        <div class="modal-body p-4 bg-surface">
          <form [formGroup]="eventForm" class="row g-3">
            <div class="col-12">
              <tm-text
                formControlName="titulo"
                label="Título do Evento"
                placeholder="Ex: Prova de Matemática"
                icon="bi-pen"
              ></tm-text>
            </div>

            <div class="col-12">
              <tm-date formControlName="dataInicio" label="Início"></tm-date>
            </div>

            <div class="col-12">
              <tm-date formControlName="dataFim" label="Término"></tm-date>
            </div>

            <div class="col-12">
              <div class="d-flex align-items-end gap-2">
                <div class="flex-grow-1">
                  <tm-select
                    formControlName="categoria"
                    label="Categoria"
                    placeholder="Selecione..."
                    [options]="categoryOptions()"
                    icon="bi-tags"
                  ></tm-select>
                </div>
                <!-- Align the settings button vertically matching tm-select input height roughly (input is ~42px, margin-bottom depends on layout) -->
                <!-- tm-select usually has a label with mb-2. The input itself is around 40px height. -->
                <button
                  type="button"
                  class="btn btn-outline-primary rounded-3 d-flex align-items-center justify-content-center border shadow-xs transition-hover"
                  style="width: 44px; height: 42px; margin-top: 26px"
                  title="Gerenciar Categorias"
                  (click)="onCategoryManage.emit()"
                >
                  <i class="bi bi-gear-fill"></i>
                </button>
              </div>
            </div>

            <div class="col-12">
              <label class="form-label small fw-bold text-muted text-uppercase tracking-wider mb-2"
                >Descrição (Opcional)</label
              >
              <textarea
                class="form-control bg-light border-0 rounded-3 shadow-sm custom-scrollbar transition-all"
                formControlName="descricao"
                rows="3"
                placeholder="Detalhes adicionais do evento..."
              ></textarea>
            </div>
          </form>
        </div>

        <!-- Footer -->
        <div
          class="modal-footer border-top-0 bg-surface p-4 pt-2 d-flex justify-content-between align-items-center flex-wrap gap-3"
        >
          <div class="order-2 order-md-1 w-100 w-md-auto text-center text-md-start">
            <button
              *ngIf="editingEventId()"
              type="button"
              class="btn btn-danger text-white border-0 fw-bold shadow-xs transition-hover rounded-3"
              (click)="deleteEvent()"
            >
              <i class="bi bi-trash me-1"></i> Excluir
            </button>
          </div>
          <div class="d-flex gap-2 w-100 w-md-auto order-1 order-md-2 justify-content-end">
            <button
              type="button"
              class="btn btn-light px-4 fw-bold text-muted border transition-hover rounded-3"
              (click)="closeModal()"
            >
              Cancelar
            </button>
            <button
              type="button"
              class="btn btn-primary px-4 fw-bold shadow-sm transition-hover rounded-3"
              (click)="saveEvent()"
              [disabled]="isSubmitting()"
            >
              {{ isSubmitting() ? 'Salvando...' : 'Salvar Evento' }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
