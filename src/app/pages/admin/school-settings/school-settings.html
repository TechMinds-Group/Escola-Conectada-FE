<div class="container-fluid py-4 pb-5">
  <!-- Sticky Header -->
  <div class="sticky-top bg-transparent backdrop-blur mb-4 py-3 z-3 sticky-header">
    <div>
      <h2 class="fw-bold mb-0 text-dark fs-4">Configurações da Instituição</h2>
      <p class="text-muted mb-0 small text-uppercase fw-semibold tracking-wider opacity-75">
        Identidade e Dados Cadastrais
      </p>
    </div>
  </div>

  <div class="row justify-content-center animate-fade-in-up">
    <div class="col-12 col-xl-8">
      <div class="card border-0 shadow-sm rounded-4 overflow-hidden bg-white">
        <div class="card-body p-4 p-lg-5">
          <form [formGroup]="form" class="row g-4">
            <!-- Identity Section -->
            <div class="col-12">
              <h6 class="xx-small text-primary fw-bold text-uppercase mb-4 tracking-widest">
                <i class="bi bi-building me-2"></i>Identidade Visual
              </h6>

              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label small fw-bold text-muted text-uppercase tracking-wider"
                    >Nome da Instituição</label
                  >
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-fonts text-primary"></i></span>
                    <input
                      formControlName="name"
                      type="text"
                      maxlength="50"
                      class="form-control fw-bold py-2"
                      readonly
                    />
                  </div>
                </div>
              </div>
            </div>

            <div class="col-12 py-2">
              <hr class="opacity-10" />
            </div>

            <!-- Registration Data -->
            <div class="col-12">
              <h6 class="xx-small text-primary fw-bold text-uppercase mb-4 tracking-widest">
                <i class="bi bi-file-earmark-text me-2"></i>Dados Cadastrais
              </h6>

              <div class="row g-4">
                <div class="col-12 col-md-6">
                  <label class="form-label small fw-bold text-muted text-uppercase tracking-wider"
                    >CNPJ</label
                  >
                  <div class="input-group">
                    <span class="input-group-text"
                      ><i class="bi bi-card-text text-primary"></i
                    ></span>
                    <input
                      formControlName="cnpj"
                      type="text"
                      class="form-control fw-bold py-2"
                      readonly
                    />
                  </div>
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label small fw-bold text-muted text-uppercase tracking-wider"
                    >E-mail Administrativo</label
                  >
                  <div class="input-group">
                    <span class="input-group-text"
                      ><i class="bi bi-envelope text-primary"></i
                    ></span>
                    <input
                      formControlName="email"
                      type="email"
                      maxlength="200"
                      class="form-control fw-bold py-2"
                      readonly
                    />
                  </div>
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label small fw-bold text-muted text-uppercase tracking-wider"
                    >Telefone Principal</label
                  >
                  <div class="input-group">
                    <span class="input-group-text"
                      ><i class="bi bi-telephone text-primary"></i
                    ></span>
                    <input
                      formControlName="phone"
                      type="tel"
                      class="form-control fw-bold py-2"
                      readonly
                    />
                  </div>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
