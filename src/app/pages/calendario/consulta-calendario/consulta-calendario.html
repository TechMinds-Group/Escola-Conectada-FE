<div class="container-fluid py-4 pb-5">
  <!-- Header -->
  <div
    class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3 mb-4 text-center text-md-start"
  >
    <div class="w-100 w-md-auto">
      <h2 class="fw-bold mb-0 text-primary fs-4 fs-md-2">{{ t().admin.calendar.title }}</h2>
      <p class="text-muted mb-0 small">{{ t().admin.calendar.subtitle }}</p>
    </div>

    <!-- Navigation (Central) -->
    <div
      class="d-flex align-items-center justify-content-center justify-content-md-start flex-wrap gap-2 gap-md-3 w-100 w-md-auto"
    >
      <div class="btn-group shadow-sm">
        <button
          class="btn btn-light border bg-white rounded-start-4 px-3"
          (click)="decrementDate()"
        >
          <i class="bi bi-chevron-left"></i>
        </button>
        <button class="btn btn-light border bg-white px-3 fw-bold" (click)="today()">Hoje</button>
        <button class="btn btn-light border bg-white rounded-end-4 px-3" (click)="incrementDate()">
          <i class="bi bi-chevron-right"></i>
        </button>
      </div>

      <div class="d-flex align-items-center justify-content-center gap-2 flex-wrap">
        <span
          class="badge nav-month-badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25 px-3 py-2 rounded-pill text-capitalize fw-bold fs-6 shadow-sm"
        >
          {{ viewMonth() }}
        </span>
        <span
          class="badge nav-year-badge bg-secondary bg-opacity-10 text-secondary border border-secondary border-opacity-25 px-3 py-2 rounded-pill fw-bold fs-6 shadow-sm"
        >
          {{ viewYear() }}
        </span>
      </div>
    </div>

    <!-- Mobile FAB -->
    <div
      class="d-md-none position-fixed bottom-0 end-0 m-4 z-3"
      style="margin-bottom: 5rem !important"
    >
      <button
        class="btn btn-primary rounded-circle shadow-lg p-0 d-flex align-items-center justify-content-center"
        style="width: 56px; height: 56px"
        (click)="navigateToNew()"
      >
        <i class="bi bi-plus-lg fs-3 text-white"></i>
      </button>
    </div>
  </div>

  <!-- Filters Card & Actions -->
  <div class="card border-0 shadow-sm rounded-4 p-3 mb-4">
    <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
      <div class="d-flex align-items-center gap-3">
        <span class="text-muted small fw-bold text-uppercase tracking-wider">Filtros:</span>

        <div class="dropdown" tourAnchor="calendarFilterDropdown">
          <button
            class="btn btn-white border bg-white rounded-3 px-3 py-2 d-flex align-items-center gap-2 shadow-sm dropdown-toggle fw-semibold"
            type="button"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            <i class="bi bi-funnel text-primary"></i>
            Categorias
            <span
              class="badge bg-primary rounded-pill small ms-1"
              *ngIf="activeFilters().length < eventCategories().length"
            >
              {{ activeFilters().length }}
            </span>
          </button>
          <ul class="dropdown-menu shadow border-0 rounded-4 p-2" style="min-width: 220px">
            <li *ngFor="let cat of eventCategories()">
              <label
                class="dropdown-item d-flex align-items-center gap-2 rounded-3 py-2 cursor-pointer"
              >
                <input
                  type="checkbox"
                  class="form-check-input mt-0"
                  [checked]="isFilterActive(cat)"
                  (change)="toggleFilter(cat)"
                />
                <span class="fw-medium">{{ cat }}</span>
              </label>
            </li>
            <li class="dropdown-divider opacity-50"></li>
            <li>
              <button
                class="dropdown-item text-center small text-primary fw-bold rounded-3"
                (click)="activeFilters.set(eventCategories())"
              >
                Selecionar Todas
              </button>
            </li>
          </ul>
        </div>
      </div>

      <!-- New Event Button (Visible in Desktop row) -->
      <button
        class="btn btn-primary d-none d-md-flex align-items-center gap-2 px-4 py-2 shadow-sm fw-bold rounded-4"
        (click)="navigateToNew()"
      >
        <i class="bi bi-plus-lg fs-5"></i>
        {{ t().admin.calendar.buttons.new }}
      </button>
    </div>
  </div>

  <!-- Calendar Rendering -->
  <div class="card border-0 shadow-sm rounded-4 overflow-hidden" [ngSwitch]="calendarView">
    <mwl-calendar-month-view
      *ngSwitchCase="CalendarView.Month"
      [viewDate]="viewDate()"
      [events]="events()"
      [locale]="'pt-BR'"
      [weekStartsOn]="0"
      [cellTemplate]="monthCellTemplate"
      (dayClicked)="handleDayClick($event.day.date)"
      (eventClicked)="handleEventClick($event.event)"
    >
    </mwl-calendar-month-view>

    <!-- Template Customizado para Célula do Mês -->
    <ng-template #monthCellTemplate let-day="day" let-openDay="openDay" let-locale="locale">
      <div class="cal-cell-top">
        <span class="cal-day-number">{{
          day.date | calendarDate: 'monthViewDayNumber' : locale
        }}</span>
      </div>
      <div class="cal-events">
        <div
          *ngFor="let event of day.events"
          class="cal-event"
          [style.backgroundColor]="event.color?.primary"
          [title]="event.title"
          (click)="$event.stopPropagation(); handleEventClick(event)"
        >
          {{ event.title }}
        </div>
      </div>
    </ng-template>

    <mwl-calendar-day-view
      *ngSwitchCase="CalendarView.Day"
      [viewDate]="viewDate()"
      [events]="events()"
      [locale]="'pt-BR'"
      (eventClicked)="handleEventClick($event.event)"
    >
    </mwl-calendar-day-view>
  </div>

  <!-- Event Modal -->
  <app-modal-manage-event
    [isOpen]="isModalOpen()"
    (close)="closeModal()"
    (onSaved)="loadEvents()"
    (onCategoryManage)="openCategoryManager()"
  ></app-modal-manage-event>

  <!-- Category Management Modal -->
  <app-modal-manage-list
    #categoryModal
    [isOpen]="showCategoryManager()"
    title="Gerenciar Categorias"
    subtitle="Configure as categorias disponíveis para seus eventos"
    labelNew="Nova Categoria"
    labelEdit="Editar Categoria"
    inputPlaceholder="Ex: Reunião de Pais"
    [items]="categoryItems"
    emptyMessage="Nenhuma categoria cadastrada."
    emptyIcon="bi-tag"
    (close)="closeCategoryManager()"
    (onSave)="saveCategory($event)"
    (onDelete)="deleteCategory($event)"
  ></app-modal-manage-list>
</div>
