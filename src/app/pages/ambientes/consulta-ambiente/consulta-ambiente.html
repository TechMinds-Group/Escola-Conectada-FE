<div class="container-fluid py-4 pb-5">
  <!-- Header -->
  <header class="mb-3">
    <div class="row g-3 align-items-center">
      <div class="col-12 col-md-auto">
        <h2 class="fw-bold mb-0 text-primary fs-3">Ambientes</h2>
        <p class="text-muted mb-0 small opacity-75">Gerenciamento de salas e espaços</p>
      </div>

      <div class="col-12 col-md-auto ms-auto">
        <button
          class="btn btn-primary d-flex align-items-center justify-content-center gap-2 px-4 py-2 shadow-sm fw-bold transition-hover rounded-3 w-100"
          (click)="navigateToNew()"
        >
          <i class="bi bi-plus-lg fs-5"></i>
          Novo Ambiente
        </button>
      </div>
    </div>
  </header>

  <!-- Filters Button Row -->
  <div class="row mb-3 animate-in">
    <div class="col-12 col-md-auto ms-auto">
      <button
        class="btn d-flex align-items-center justify-content-center gap-2 px-3 py-2 rounded-3 transition-hover border shadow-xs w-100"
        [class.btn-primary]="isFilterPanelOpen()"
        [class.btn-light]="!isFilterPanelOpen()"
        (click)="toggleFilterPanel()"
      >
        <i
          class="bi"
          [class.bi-funnel]="!isFilterPanelOpen()"
          [class.bi-chevron-up]="isFilterPanelOpen()"
        ></i>
        <span class="fw-bold">Filtros</span>
        @if (isFilterActive()) {
          <span
            class="badge rounded-circle bg-primary p-1 ms-1"
            style="width: 8px; height: 8px"
          ></span>
        }
      </button>
    </div>
  </div>

  <!-- Retractable Filter Panel -->
  @if (isFilterPanelOpen()) {
    <section class="filters-panel mb-4 animate-in">
      <div class="card border-0 shadow-lg rounded-4 overflow-hidden bg-surface">
        <div class="card-body p-4">
          <div class="grid-layout mb-4">
            <tm-text
              [formControl]="filterName"
              placeholder="Ex: 101, Laboratório de Química"
              icon="bi-search"
              label="Nome do Ambiente"
            ></tm-text>
            <tm-select
              [formControl]="filterType"
              [options]="typeOptions()"
              placeholder="Tipo"
              icon="bi-building"
              label="Tipo"
            ></tm-select>
          </div>

          <div class="pt-3 border-top">
            <div class="row g-2 justify-content-end">
              <div class="col-12 col-lg-auto">
                <button
                  class="btn btn-light rounded-3 px-4 py-2 fw-bold text-muted transition-hover border w-100"
                  (click)="clearFilters()"
                >
                  Limpar Filtros
                </button>
              </div>
              <div class="col-12 col-lg-auto">
                <button
                  class="btn btn-primary rounded-3 px-4 py-2 fw-bold transition-hover shadow-sm w-100"
                  (click)="applyFilters()"
                >
                  Aplicar Filtros
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  }

  <!-- Desktop Table (tm-table) -->
  <main class="animate-in d-none d-md-block">
    <tm-table
      [cols]="[
        { header: 'Nome/Identificação', template: nameTpl, width: '50%' },
        { header: 'Tipo', template: typeTpl, width: '16.67%' },
        {
          header: 'Capacidade',
          template: capacityTpl,
          width: '16.66%',
          class: 'text-center',
          headerClass: 'text-center',
        },
        { header: 'Bloco', key: 'block', width: '16.67%' },
      ]"
      [data]="rooms()"
      (rowClick)="navigateToEdit($event.id!)"
    ></tm-table>

    <!-- Templates for Table Columns -->
    <ng-template #nameTpl let-room>
      <div class="d-flex align-items-center gap-3 ps-3 text-start">
        <div
          class="rounded-3 bg-primary-subtle text-primary d-flex align-items-center justify-content-center"
          style="width: 40px; height: 40px"
        >
          <i class="bi bi-building fs-5"></i>
        </div>
        <div class="fw-bold text-dark">{{ room.name }}</div>
      </div>
    </ng-template>

    <ng-template #typeTpl let-room>
      <div class="text-start">
        <span class="badge bg-light text-dark border px-3 py-1 rounded-pill fw-normal">
          {{ room.type }}
        </span>
      </div>
    </ng-template>

    <ng-template #capacityTpl let-room>
      <div class="d-flex align-items-center justify-content-center gap-2">
        <i class="bi bi-people-fill text-muted small"></i>
        <span class="fw-bold text-dark">{{ room.capacity }}</span>
      </div>
    </ng-template>

  </main>

  <!-- Mobile View: Cards -->
  <div class="d-md-none d-flex flex-column gap-3">
    @for (room of rooms(); track room.id) {
      <div
        class="card border-0 shadow-sm rounded-4 p-3 animate-in"
        (click)="navigateToEdit(room.id!)"
      >
        <div class="d-flex justify-content-between align-items-start mb-2">
          <div class="d-flex align-items-center gap-3">
            <div
              class="bg-primary-subtle text-primary rounded-3 d-flex align-items-center justify-content-center flex-shrink-0"
              style="width: 48px; height: 48px"
            >
              <i class="bi bi-building fs-4"></i>
            </div>
            <div>
              <h6 class="fw-bold text-dark mb-0">{{ room.name }}</h6>
              <div class="small text-muted">{{ room.block }}</div>
            </div>
          </div>
          <span
            class="badge bg-success-subtle text-success border-0 px-2 py-1 rounded-pill smaller"
          >
            Ativo
          </span>
        </div>

        <div
          class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top border-light"
        >
          <div class="d-flex align-items-center gap-2 text-muted small">
            <i class="bi bi-people-fill"></i>
            <span class="fw-bold">{{ room.capacity }} alunos</span>
          </div>
          <span class="badge bg-light text-dark border px-2 py-1 rounded-pill smaller fw-normal">
            {{ room.type }}
          </span>
        </div>
      </div>
    } @empty {
      <div class="text-center py-5 text-muted bg-white rounded-4 shadow-sm border">
        <i class="bi bi-building-slash fs-1 d-block mb-3 opacity-25"></i>
        <p class="mb-0">Nenhum ambiente encontrado</p>
      </div>
    }
  </div>
</div>
