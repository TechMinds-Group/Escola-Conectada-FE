<div class="d-flex" id="wrapper">
  <!-- Sidebar for Desktop -->
  @if (!hideNavigation()) {
    <div class="d-none d-md-block border-end shadow-sm" style="z-index: 1001">
      <app-sidebar></app-sidebar>
    </div>
  }

  <!-- Mobile Offcanvas Sidebar -->
  @if (!hideNavigation()) {
    <div
      class="offcanvas offcanvas-start"
      tabindex="-1"
      id="mobileSidebar"
      aria-labelledby="mobileSidebarLabel"
      style="width: 280px; background-color: var(--surface-color)"
    >
      <div class="offcanvas-header pb-0">
        <button
          type="button"
          class="btn-close ms-auto"
          data-bs-dismiss="offcanvas"
          aria-label="Close"
        ></button>
      </div>
      <div class="offcanvas-body pt-0">
        <app-sidebar></app-sidebar>
      </div>
    </div>
  }

  <!-- Main Content Wrapper -->
  <div
    id="page-content-wrapper"
    class="flex-grow-1 d-flex flex-column"
    style="min-height: 100vh"
    [style.background-color]="isPublicView() && !isMobile() ? '#0f172a' : 'var(--bg-color)'"
  >
    @if (!hideNavigation()) {
      <app-topbar></app-topbar>
    }

    <main
      class="container-fluid flex-grow-1"
      [class.p-4]="!hideNavigation()"
      [class.p-0]="hideNavigation()"
    >
      <router-outlet></router-outlet>
    </main>
  </div>

  <!-- Mobile Navigation Bar -->
  @if (!hideNavigation()) {
    <div class="d-md-none">
      <app-mobile-navbar></app-mobile-navbar>
    </div>
  }
</div>
