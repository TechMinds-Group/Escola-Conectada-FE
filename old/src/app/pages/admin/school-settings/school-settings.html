<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <!-- Header -->
      <div class="text-center mb-5 animate-slide-down">
        <h2 class="fw-bold text-main mb-1">Configurações da Instituição</h2>
        <p class="text-muted small">Defina a identidade da sua escola no sistema.</p>
      </div>

      <!-- Form Card -->
      <div
        class="card bg-surface border-theme shadow-lg rounded-4 overflow-hidden animate-fade-in-up"
      >
        <!-- Logo Upload Area -->
        <div
          class="bg-light-alpha border-bottom border-theme p-5 text-center position-relative group-hover-light cursor-pointer"
        >
          <div
            class="d-flex flex-column align-items-center justify-content-center text-muted gap-2"
          >
            <div class="icon-circle bg-surface border-theme rounded-circle p-4 mb-2 shadow-sm">
              <i class="bi bi-cloud-arrow-up-fill fs-2 text-primary"></i>
            </div>
            <h6 class="fw-bold mb-0">Arraste sua logo aqui</h6>
            <small>Ou clique para selecionar (PNG, JPG)</small>
          </div>
          <input
            type="file"
            class="position-absolute top-0 start-0 w-100 h-100 opacity-0 cursor-pointer"
          />
        </div>

        <div class="card-body p-4 p-md-5">
          <form [formGroup]="form" class="d-flex flex-column gap-4">
            <!-- Identity Section -->
            <div>
              <h6 class="text-xs fw-bold text-muted text-uppercase mb-3 tracking-tight">
                Identidade Visual
              </h6>
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label text-muted small fw-bold">Nome da Instituição</label>
                  <input
                    formControlName="name"
                    type="text"
                    class="form-control bg-light-alpha border-theme text-main p-3"
                    placeholder="Ex: Escola Conectada"
                  />
                </div>
                <div class="col-12">
                  <label class="form-label text-muted small fw-bold">Slogan (Opcional)</label>
                  <input
                    formControlName="slogan"
                    type="text"
                    class="form-control bg-light-alpha border-theme text-main p-3"
                    placeholder="Ex: Futuro em cada detalhe"
                  />
                </div>
              </div>
            </div>

            <hr class="border-theme opacity-50 my-0" />

            <!-- Contact Section -->
            <div>
              <h6 class="text-xs fw-bold text-muted text-uppercase mb-3 tracking-tight">
                Dados Cadastrais
              </h6>
              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label text-muted small fw-bold">CNPJ</label>
                  <input
                    formControlName="cnpj"
                    type="text"
                    class="form-control bg-light-alpha border-theme text-main p-3"
                    placeholder="00.000.000/0001-00"
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label text-muted small fw-bold">E-mail de Contato</label>
                  <input
                    formControlName="email"
                    type="email"
                    class="form-control bg-light-alpha border-theme text-main p-3"
                    placeholder="contato@escola.com"
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label text-muted small fw-bold">Telefone</label>
                  <input
                    formControlName="phone"
                    type="tel"
                    class="form-control bg-light-alpha border-theme text-main p-3"
                    placeholder="(00) 0000-0000"
                  />
                </div>
              </div>
            </div>

            <div class="mt-4">
              <button
                (click)="save()"
                [disabled]="form.invalid"
                class="btn btn-primary w-100 py-3 fw-bold shadow-sm hover-lift"
              >
                Salvar Alterações
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
