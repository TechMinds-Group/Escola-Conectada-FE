<div class="container-fluid py-4 page-container">
  <!-- Header -->
  <div class="d-flex align-items-center gap-3 mb-4">
    <button
      class="btn btn-icon bg-white shadow-sm rounded-circle"
      routerLink="/consulta-calendario"
    >
      <i class="bi bi-arrow-left"></i>
    </button>
    <div>
      <h2 class="fw-bold mb-0 text-main">
        {{ isEditMode() ? t().admin.calendar.form.title.edit : t().admin.calendar.form.title.new }}
      </h2>
      <p class="text-muted mb-0">{{ t().admin.calendar.form.subtitle }}</p>
    </div>

    @if (isEditMode()) {
      <button
        class="btn btn-outline-danger btn-sm ms-auto rounded-3 px-3 d-flex align-items-center gap-2"
        (click)="deleteEvent()"
      >
        <i class="bi bi-trash"></i>
        <span class="d-none d-md-inline">{{ t().admin.calendar.buttons.delete }}</span>
      </button>
    }
  </div>

  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <form [formGroup]="eventForm" (ngSubmit)="onSubmit()">
        <!-- Main Details Card -->
        <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
          <h6 class="text-uppercase text-muted fw-bold small mb-3">
            {{ t().admin.calendar.form.sections.details }}
          </h6>

          <div class="row g-3">
            <div class="col-12">
              <label class="form-label small fw-bold text-muted">{{
                t().admin.calendar.form.fields.name
              }}</label>
              <input
                type="text"
                class="form-control"
                formControlName="name"
                [placeholder]="t().admin.calendar.form.placeholders.name"
                [class.is-invalid]="eventForm.get('name')?.invalid && saveAttempted()"
              />
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label small fw-bold text-muted">{{
                t().admin.calendar.form.fields.start
              }}</label>
              <input
                type="date"
                class="form-control"
                formControlName="startDate"
                [class.is-invalid]="eventForm.get('startDate')?.invalid && saveAttempted()"
              />
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label small fw-bold text-muted">{{
                t().admin.calendar.form.fields.end
              }}</label>
              <input
                type="date"
                class="form-control"
                formControlName="endDate"
                [class.is-invalid]="eventForm.get('endDate')?.invalid && saveAttempted()"
              />
            </div>

            <div class="col-12">
              <label class="form-label small fw-bold text-muted">{{
                t().admin.calendar.form.fields.type
              }}</label>
              <select
                class="form-select"
                formControlName="type"
                [class.is-invalid]="eventForm.get('type')?.invalid && saveAttempted()"
              >
                @for (type of eventTypes; track type) {
                  <option [value]="type">{{ getEventTypeLabel(type) }}</option>
                }
              </select>
            </div>
          </div>
        </div>

        <!-- Pedagogical Intelligence Card -->
        <div class="card border-0 shadow-sm rounded-4 p-4 mb-4 bg-light-subtle">
          <div class="d-flex align-items-center mb-3">
            <i class="bi bi-cpu text-primary me-2 fs-5"></i>
            <h6 class="text-uppercase text-primary fw-bold small mb-0">
              {{ t().admin.calendar.form.sections.intelligence }}
            </h6>
          </div>

          <div class="d-flex flex-column gap-3">
            <!-- Toggle 1 -->
            <div class="form-check form-switch d-flex align-items-start gap-2 ps-0">
              <input
                class="form-check-input ms-0 mt-1"
                type="checkbox"
                id="schoolDayToggle"
                formControlName="isSchoolDay"
                style="margin-left: 0 !important"
              />
              <label class="form-check-label ms-2" for="schoolDayToggle">
                <span class="d-block fw-bold text-dark">{{
                  t().admin.calendar.form.toggles.schoolDay.label
                }}</span>
                <span class="d-block small text-muted">{{
                  t().admin.calendar.form.toggles.schoolDay.hint
                }}</span>
              </label>
            </div>

            <!-- Toggle 2 -->
            <div class="form-check form-switch d-flex align-items-start gap-2 ps-0">
              <input
                class="form-check-input ms-0 mt-1"
                type="checkbox"
                id="suspendClassesToggle"
                formControlName="suspendClasses"
                style="margin-left: 0 !important"
              />
              <label class="form-check-label ms-2" for="suspendClassesToggle">
                <span class="d-block fw-bold text-dark">{{
                  t().admin.calendar.form.toggles.suspendClasses.label
                }}</span>
                <span class="d-block small text-muted">{{
                  t().admin.calendar.form.toggles.suspendClasses.hint
                }}</span>
              </label>
            </div>
          </div>
        </div>

        <!-- Scope Card -->
        <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
          <h6 class="text-uppercase text-muted fw-bold small mb-3">
            {{ t().admin.calendar.form.sections.scope }}
          </h6>
          <div class="row">
            <div class="col-12">
              <label class="form-label small fw-bold text-muted">{{
                t().admin.calendar.form.fields.scope
              }}</label>
              <select class="form-select" formControlName="scope">
                <option value="Todos">{{ t().admin.calendar.form.options.all }}</option>
                <option value="Fundamental">
                  {{ t().admin.calendar.form.options.elementary }}
                </option>
                <option value="Médio">{{ t().admin.calendar.form.options.highSchool }}</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Actions -->
        <div class="d-flex justify-content-end gap-2 border-top pt-4">
          <button type="button" class="btn btn-light px-4" routerLink="/consulta-calendario">
            {{ t().admin.calendar.buttons.cancel }}
          </button>
          <button type="submit" class="btn btn-primary px-4 d-flex align-items-center gap-2">
            {{ isEditMode() ? t().admin.calendar.buttons.save : t().admin.calendar.buttons.create }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
